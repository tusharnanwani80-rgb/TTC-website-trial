<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTC Tenses Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Poppins, sans-serif;
background:#f7f4ea;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:600px;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.logo{
width:70px;
border-radius:50%;
position:absolute;
right:20px;
top:20px;
}

.header{
position:absolute;
left:20px;
top:25px;
font-weight:600;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
}

.start-btn{
background:#5cc6b3;
color:white;
margin-top:20px;
}

.option{
display:block;
width:100%;
margin:10px 0;
background:#f2f2f2;
}

.correct{
background:#90ee90;
}

.wrong{
background:#ffb6b6;
}

.next-btn{
background:#ff7f7f;
color:white;
margin-top:15px;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ccc;
width:80%;
}

.hidden{
display:none;
}

.result{
font-size:22px;
font-weight:600;
}

</style>
</head>

<body>

<img class="logo" src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png">
<div class="header">TTC Quiz</div>

<div class="container">

<div id="nameModal" class="card">
<h2>Enter Your Name</h2>
<input id="nameInput" placeholder="Your Name">
<br>
<button class="start-btn" onclick="start()">Continue</button>
</div>


<div id="welcome" class="card hidden">
<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" width="90">
<h2 id="welcomeText"></h2>
<button class="start-btn" onclick="startQuiz()">Start Quiz</button>
</div>


<div id="quiz" class="card hidden">

<h3 id="question"></h3>

<div id="options"></div>

<button id="nextBtn" class="next-btn hidden" onclick="nextQuestion()">Next Question</button>

</div>


<div id="result" class="card hidden">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" width="90">

<h2>Quiz Completed</h2>

<div class="result" id="score"></div>

<p id="message"></p>

<button class="start-btn" onclick="restart()">Restart Quiz</button>

</div>

</div>

<script>

let quizData = [

{
question:"She ____ to school every day.",
options:["go","goes","going","gone"],
correctIndex:1,
explanation:"Present simple tense for third person singular."
},

{
question:"They ____ football when it started raining.",
options:["play","were playing","played","playing"],
correctIndex:1,
explanation:"Past continuous describes an ongoing past action."
},

{
question:"I ____ my homework already.",
options:["finish","finished","have finished","finishing"],
correctIndex:2,
explanation:"Present perfect for completed action."
},

{
question:"We ____ to Mumbai next week.",
options:["go","going","will go","went"],
correctIndex:2,
explanation:"Future tense using 'will'."
},

{
question:"He ____ TV when I called him.",
options:["watch","was watching","watched","watching"],
correctIndex:1,
explanation:"Past continuous used for interrupted action."
}

];

let current=0;
let score=0;
let userName="";

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function start(){

userName=document.getElementById("nameInput").value;

if(!userName)return;

localStorage.setItem("ttc_name",userName);

document.getElementById("nameModal").classList.add("hidden");

document.getElementById("welcome").classList.remove("hidden");

document.getElementById("welcomeText").innerText=`Welcome, TTC Champ ${userName}`;

}

function startQuiz(){

quizData=shuffle(quizData);

current=0;
score=0;

document.getElementById("welcome").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

showQuestion();

}

function showQuestion(){

let q=quizData[current];

document.getElementById("question").innerText=q.question;

let optionsDiv=document.getElementById("options");

optionsDiv.innerHTML="";

let opts=q.options.map((opt,i)=>({text:opt,index:i}));

opts=shuffle(opts);

opts.forEach(o=>{

let btn=document.createElement("button");

btn.innerText=o.text;

btn.className="option";

btn.onclick=()=>selectAnswer(btn,o.index);

optionsDiv.appendChild(btn);

});

document.getElementById("nextBtn").classList.add("hidden");

}

function selectAnswer(btn,index){

let q=quizData[current];

let buttons=document.querySelectorAll(".option");

buttons.forEach(b=>b.disabled=true);

if(index===q.correctIndex){

btn.classList.add("correct");

score++;

confetti({particleCount:60,spread:70,origin:{y:0.6}});

}

else{

btn.classList.add("wrong");

buttons[q.correctIndex].classList.add("correct");

alert(q.explanation);

}

document.getElementById("nextBtn").classList.remove("hidden");

}

function nextQuestion(){

current++;

if(current<quizData.length){

showQuestion();

}

else{

finishQuiz();

}

}

function finishQuiz(){

document.getElementById("quiz").classList.add("hidden");

document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=`${score} / ${quizData.length}`;

let percent=(score/quizData.length)*100;

if(percent>=75){

document.getElementById("message").innerText=`Well Done, ${userName}! You’re a true TTC Champ!`;

confetti({particleCount:200,spread:120});

}

else{

document.getElementById("message").innerText=`Good try ${userName}! Practice more and become a TTC Champ.`;

}

}

function restart(){

location.reload();

}

window.onload=function(){

let saved=localStorage.getItem("ttc_name");

if(saved){

document.getElementById("nameInput").value=saved;

}

}

</script>

</body>
</html>
