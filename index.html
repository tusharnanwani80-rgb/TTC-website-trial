<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTC Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<!-- LOGO -->
<div class="text-center mt-10">
<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="mx-auto w-24">
</div>

<section class="py-20 px-6">

<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12">

<!-- LEFT SIDE -->
<div>

<h1 class="text-4xl font-bold mb-4">
Contact Us
</h1>

<p class="text-gray-600 mb-8">
We are available for questions, feedback, or collaboration opportunities. Let us know how we can help!
</p>

<h3 class="text-xl font-semibold mb-4">
Contact Details
</h3>

<ul class="space-y-3 list-disc ml-5">

<li>
<b>Phone:</b> +91 9876543210
</li>

<li>
<b>Email:</b>
<a href="mailto:ttctuition@gmail.com" class="text-blue-600 underline">
ttctuition@gmail.com
</a>
</li>

<li>
<b>Website:</b>
<a href="#" class="text-blue-600 underline">
TTC Tuition Classes
</a>
</li>

</ul>

</div>


<!-- FORM -->
<div class="bg-white rounded-xl shadow-lg p-8 space-y-6">

<div class="grid grid-cols-2 gap-4">

<div>
<label class="text-sm font-medium">First Name</label>
<input type="text" placeholder="First Name"
class="w-full border rounded-md p-2 mt-1">
</div>

<div>
<label class="text-sm font-medium">Last Name</label>
<input type="text" placeholder="Last Name"
class="w-full border rounded-md p-2 mt-1">
</div>

</div>


<div>
<label class="text-sm font-medium">Email</label>
<input type="email" placeholder="Email"
class="w-full border rounded-md p-2 mt-1">
</div>


<div>
<label class="text-sm font-medium">Subject</label>
<input type="text" placeholder="Subject"
class="w-full border rounded-md p-2 mt-1">
</div>


<div>
<label class="text-sm font-medium">Message</label>
<textarea rows="4" placeholder="Type your message"
class="w-full border rounded-md p-2 mt-1"></textarea>
</div>


<button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-md">
Send Message
</button>

</div>

</div>

</section>

</body>
</html>
