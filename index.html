<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTC Quiz</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family: "Segoe UI", sans-serif;
background:#f6f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#333;
}

.app{
width:380px;
max-width:95%;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
width:80px;
margin-bottom:10px;
}

button{
padding:12px 22px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:15px;
}

.primary{
background:#58d5c2;
color:white;
}

.secondary{
background:#ff7f7f;
color:white;
}

.option{
background:#f2f2f2;
margin:8px 0;
padding:12px;
border-radius:12px;
cursor:pointer;
transition:0.25s;
}

.option:hover{
transform:scale(1.04);
}

.correct{
background:#c8f7c5;
}

.wrong{
background:#ffd0d0;
}

.hidden{
display:none;
}

.slide{
animation:slide 0.4s;
}

@keyframes slide{
from{opacity:0;transform:translateX(30px)}
to{opacity:1;transform:translateX(0)}
}

.progress{
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:15px;
}

.bar{
height:8px;
background:#58d5c2;
width:0%;
border-radius:10px;
transition:0.4s;
}

.explanation{
font-size:14px;
margin-top:10px;
color:#555;
}

.result{
font-size:22px;
margin-top:10px;
}

.share{
background:#25D366;
color:white;
margin-top:10px;
}

.rating{
background:#6c63ff;
color:white;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<!-- NAME INPUT -->
<div id="nameScreen" class="card">
<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">
<h3>Enter Your Name</h3>
<input id="username" placeholder="Your name" style="padding:10px;width:90%;border-radius:8px;border:1px solid #ccc"><br><br>
<button class="primary" onclick="startWelcome()">Continue</button>
</div>

<!-- WELCOME -->
<div id="welcomeScreen" class="card hidden">
<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">
<h2 id="welcomeText"></h2>
<button class="primary" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="card hidden">

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<h3 id="question"></h3>

<div id="options"></div>

<div id="explanation" class="explanation"></div>

<br>
<button id="nextBtn" class="primary hidden" onclick="nextQuestion()">Next Question</button>

</div>

<!-- RESULT -->
<div id="resultScreen" class="card hidden">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">

<div class="result" id="scoreText"></div>
<div id="message"></div>

<button class="share" onclick="shareWhatsApp()">Share on WhatsApp</button>

<button class="rating" onclick="rateUs()">Click Me</button>

<br><br>

<button class="primary" onclick="restartQuiz()">Restart Quiz</button>

</div>

</div>

<script>

let username=""

function startWelcome(){
username=document.getElementById("username").value
if(!username)return

localStorage.setItem("ttc_name",username)

document.getElementById("nameScreen").classList.add("hidden")
document.getElementById("welcomeScreen").classList.remove("hidden")

document.getElementById("welcomeText").innerText="Welcome, TTC Champ "+username
}

const quizData=[
{
question:"She ____ to school every day.",
options:["go","goes","going","gone"],
correctIndex:1,
explanation:"'She' is third person singular, so we use 'goes'."
},
{
question:"I ____ my homework yesterday.",
options:["did","do","done","doing"],
correctIndex:0,
explanation:"'Yesterday' indicates past tense so 'did' is correct."
},
{
question:"They ____ playing football.",
options:["is","am","are","be"],
correctIndex:2,
explanation:"Plural subject 'they' requires 'are'."
},
{
question:"We ____ dinner now.",
options:["eat","eats","are eating","ate"],
correctIndex:2,
explanation:"'Now' indicates present continuous tense."
}
]

let questions=[]
let index=0
let score=0

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function startQuiz(){

document.getElementById("welcomeScreen").classList.add("hidden")
document.getElementById("quizScreen").classList.remove("hidden")

questions=shuffle([...quizData])

loadQuestion()
}

function loadQuestion(){

let q=questions[index]

document.getElementById("question").innerText=q.question

let opts=shuffle([...q.options])

let container=document.getElementById("options")
container.innerHTML=""

opts.forEach(opt=>{

let div=document.createElement("div")
div.className="option"
div.innerText=opt

div.onclick=()=>selectOption(div,opt,q)

container.appendChild(div)

})

document.getElementById("explanation").innerText=""
document.getElementById("nextBtn").classList.add("hidden")

document.getElementById("progressBar").style.width=(index/questions.length*100)+"%"
}

function selectOption(el,opt,q){

let options=document.querySelectorAll(".option")

options.forEach(o=>o.onclick=null)

let correct=q.options[q.correctIndex]

if(opt===correct){

el.classList.add("correct")
score++

confetti({
particleCount:80,
spread:60,
origin:{y:0.6}
})

}else{

el.classList.add("wrong")

options.forEach(o=>{
if(o.innerText===correct) o.classList.add("correct")
})

}

document.getElementById("explanation").innerText="Explanation: "+q.explanation

document.getElementById("nextBtn").classList.remove("hidden")

}

function nextQuestion(){

index++

if(index>=questions.length){
showResult()
return
}

loadQuestion()
}

function showResult(){

document.getElementById("quizScreen").classList.add("hidden")
document.getElementById("resultScreen").classList.remove("hidden")

document.getElementById("scoreText").innerText=score+" / "+questions.length

if(score/questions.length>=0.75){

document.getElementById("message").innerText=
"Well Done, "+username+"! You're a true TTC Champ!"

confetti({particleCount:200,spread:120})

}else{

document.getElementById("message").innerText=
"Good try "+username+"! Keep practicing."

}

}

function shareWhatsApp(){

let text=`I scored ${score}/${questions.length} in TTC Quiz! Try it too.`

let url="https://wa.me/?text="+encodeURIComponent(text)

window.open(url)

}

function rateUs(){
window.open("https://g.page/r/YOURGOOGLERATINGLINK")
}

function restartQuiz(){
location.reload()
}

</script>

</body>
</html>
